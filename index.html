<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login – VIT Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="login.css"/>
</head>
<body>

  <header class="header">
    <div class="header-left">
      <img src="Images/logo.webp" alt="VIT Logo" class="logo-img"/>
    </div>
  </header>

  <main class="main">
    <div class="login-wrapper">

      <div class="login-eyebrow">Welcome Back</div>
      <h1 class="login-heading">Sign in to your account</h1>
      <p class="login-sub">Enter your credentials to access the portal.</p>

      <div class="login-box">

        <div class="field-group">
          <label class="field-label" for="username">Username</label>
          <input type="text" id="username" class="field-input" placeholder="Enter username"
                 onkeydown="if(event.key==='Enter') attemptLogin()"/>
          <span class="err-msg" id="usernameErr"></span>
        </div>

        <div class="field-group">
          <label class="field-label" for="password">Password</label>
          <div class="password-wrap">
            <input type="password" id="password" class="field-input" placeholder="Enter password"
                   onkeydown="if(event.key==='Enter') attemptLogin()"/>
            <button class="toggle-pw" type="button" onclick="togglePassword()" tabindex="-1">
              <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <span class="err-msg" id="passwordErr"></span>
        </div>

        <div id="alertBox" class="alert-box hidden"></div>

        <div class="attempts-row" id="attemptsRow"></div>

        <button id="loginBtn" class="login-btn" onclick="attemptLogin()"
                onmouseover="if(!this.disabled) this.classList.add('hovered')"
                onmouseout="this.classList.remove('hovered')">
          Sign In
        </button>

        <div class="demo-credentials">
          <span class="demo-label">Demo Credentials</span>
          <div class="demo-row"><span class="demo-key">Username:</span><span class="demo-val" onclick="fillCredentials()" title="Click to autofill">vitStudent</span></div>
          <div class="demo-row"><span class="demo-key">Password:</span><span class="demo-val" onclick="fillCredentials()" title="Click to autofill">vit@2025</span></div>
        </div>

      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="footer-inner">
      <p class="copyright">&copy; 2025 Vellore Institute of Technology &mdash; Student Portal</p>
    </div>
  </footer>

  <script src="login.js"></script>
</body>
</html>
